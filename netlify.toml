[build]
  command = "npm install"
  publish = "."
 
[build.environment]
  NODE_VERSION = "18"
 
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
 
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
